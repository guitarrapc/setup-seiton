name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify dist is up to date
        shell: bash
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "dist/ is not up to date. Run 'npm run build' and commit generated files."
            exit 1
          fi
          if [ -n "$(git ls-files --others --exclude-standard -- dist/)" ]; then
            echo "dist/ contains untracked generated files. Run 'npm run build' and commit generated files."
            git ls-files --others --exclude-standard -- dist/
            exit 1
          fi
