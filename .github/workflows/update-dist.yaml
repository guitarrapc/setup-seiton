name: update dist

on:
  push:
    branches:
      - main

jobs:
  update-dist:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      # Avoid running package lifecycle scripts in privileged context.
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Check regenerated dist diff
        id: dist-diff
        shell: bash
        run: |
          if git diff --quiet -- dist/ && [ -z "$(git ls-files --others --exclude-standard -- dist/)" ]; then
            echo "No dist changes."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "dist changes detected."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        if: ${{ steps.dist-diff.outputs.has_changes == 'true' }}
        id: app-token
        with:
          app-id: ${{ secrets.SYNCED_ACTIONS_BOT_APPID }}
          private-key: ${{ secrets.SYNCED_ACTIONS_BOT_PRIVATE_KEY }}
          permission-contents: write
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Setup git auth
        if: ${{ steps.dist-diff.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github-actions:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit regenerated dist
        if: ${{ steps.dist-diff.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          git add -A dist/
          git commit -m "chore: regenerate dist for dependency update"
          git push
