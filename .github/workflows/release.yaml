name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description:
          "Existing Git tag to release (e.g. v1.0.0). Must already exist on
          the remote."
        required: true
        type: string

permissions: {}

jobs:
  # Gate: validate version, run tests, verify generated data
  validate:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Resolve tag ref
        id: ref
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${TAG}"
            TAG="v${RAW#v}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: Verify tag on remote (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/git/ref/tags/${{ steps.ref.outputs.tag }}" --silent --fail \
            || { echo "::error::Tag '${{ steps.ref.outputs.tag }}' does not exist on the remote. Push it first, then re-run."; exit 1; }

      - name: Verify version ↔ tag consistency
        id: version
        run: |
          set -euo pipefail
          TAG="${{ steps.ref.outputs.tag }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag version '${TAG_VERSION}' does not match package.json version '${PKG_VERSION}'."
            exit 1
          fi
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "v${VERSION}" --generate-notes --draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
