name: setup-seiton
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  with-latest:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
          - ubuntu-24.04-arm
          - macos-26-intel
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # seiton: disable-next-line unpinned-uses
      - uses: ./
      - run: seiton --version

  with-version:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
          - ubuntu-24.04-arm
          - macos-26-intel
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # seiton: disable-next-line unpinned-uses
      - uses: ./
        with:
          seiton-version: "0.9.19"
      - run: |
          node -e "const {execSync}=require('node:child_process'); const v=execSync('seiton --version',{encoding:'utf8'}).trim(); if(!/^v?0\.9\.19$/.test(v)){ throw new Error('Unexpected version: '+v); }"

  with-version-v-prefix:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
          - ubuntu-24.04-arm
          - macos-26-intel
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # seiton: disable-next-line unpinned-uses
      - uses: ./
        with:
          seiton-version: "v0.9.19"
      - run: |
          node -e "const {execSync}=require('node:child_process'); const v=execSync('seiton --version',{encoding:'utf8'}).trim(); if(!/^v?0\.9\.19$/.test(v)){ throw new Error('Unexpected version: '+v); }"
